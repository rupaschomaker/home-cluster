apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: recyclarr
spec:
  interval: 15m
  chart:
    spec:
      chart: recyclarr
      version: 15.1.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  releaseName: recyclarr
  values:
    TZ: America/Chicago
    resources:
      requests:
        cpu: 10m
    securityContext:
      container:
        UMASK: "0022"
    workload:
      main:
        podSpec:
          initContainers:
            initconfig:
              # set this after initial setup if using volsync
              enabled: false
          containers:
            main:
              env:
                API_RADARR: ${API_RADARR}
                URL_RADARR: http://radarr.radarr.svc.cluster.local:7878
                API_SONARR: ${API_SONARR}
                URL_SONARR: http://sonarr.sonarr.svc.cluster.local:8989
    credentials:
      s3creds:
        type: s3
        url: ${VOLSYNC_S3_URL}
        bucket: ${VOLSYNC_S3_BUCKET}
        accessKey: ${VOLSYNC_S3_ACCESSKEY}
        secretKey: ${VOLSYNC_S3_SECRETKEY}
        encrKey: ${VOLSYNC_ENC_KEY}
    persistence:
      config:
        volsync:
          - name: config
            type: restic
            credentials: s3creds
            dest:
              enabled: true
            src:
              enabled: true 
              trigger:
                schedule: 00 1 * * *